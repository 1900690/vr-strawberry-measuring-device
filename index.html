<!doctype html>
<html lang="en">
  <head>
    <title>Strawberry Weigher | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * 手でイチゴを包み込むように持ち、その指先から体積と重量を測定するスクリプト。
       */
      class StrawberryWeigher extends xb.Script {
        init() {
          // 1. 照明の設定
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
          const light = new THREE.DirectionalLight(0xffffff, 1.5);
          light.position.set(1, 2, 1);
          this.add(light);

          // 2. イチゴの体積を視覚化する球体の設定（半透明の赤）
          this.sphereMaterial = new THREE.MeshStandardMaterial({
            color: 0xff3333,
            transparent: true,
            opacity: 0.6,
            roughness: 0.4,
            metalness: 0.1
          });
          this.sphere = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), this.sphereMaterial);
          this.sphere.visible = false;
          this.add(this.sphere);

          // 3. 指先を繋ぐワイヤーフレーム（輪郭）の設定
          const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
          const lineGeometry = new THREE.BufferGeometry();
          // 5本の指先の座標（x,y,z）を持つFloat32Arrayを作成
          lineGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(5 * 3), 3));
          this.line = new THREE.LineLoop(lineGeometry, lineMaterial);
          this.line.visible = false;
          this.add(this.line);

          // 4. 数値情報を表示する空間UIの作成
          this.panel = new xb.SpatialPanel({
            width: 1.2,
            height: 0.7,
            backgroundColor: '#1a1a1add'
          });
          
          // 初期位置（updateメソッド内でカメラに追従させます）
          this.panel.position.set(0, 1.8, -1.2);
          this.add(this.panel);

          const grid = this.panel.addGrid();
          grid.addRow({weight: 0.25}).addText({ text: '🍓 イチゴ重量測定', fontColor: '#ff7777', fontSize: 0.1 });
          
          this.radiusText = grid.addRow({weight: 0.2}).addText({ text: '推定半径: - cm', fontColor: '#ffffff', fontSize: 0.06 });
          this.volumeText = grid.addRow({weight: 0.2}).addText({ text: '推定体積: - cm³', fontColor: '#ffffff', fontSize: 0.06 });
          this.weightText = grid.addRow({weight: 0.35}).addText({ text: '推定重量: - g', fontColor: '#ffff88', fontSize: 0.1 });

          this.panel.updateLayouts();
        }

        update() {
          // --- 5. UIパネルのヘッドトラッキング（頭への追従） ---
          const camera = xb.core.camera;
          // カメラから奥に1.2m、上に0.3m（手が被らないように高めに設定）
          const targetOffset = new THREE.Vector3(0, 0.3, -1.2);
          const targetPosition = targetOffset.applyMatrix4(camera.matrixWorld);

          // 位置と回転を滑らかにカメラに追従させる
          this.panel.position.lerp(targetPosition, 0.08);
          this.panel.quaternion.slerp(camera.quaternion, 0.08);


          // --- 6. ハンドトラッキングと測定ロジック ---
          const hands = xb.user.hands;
          // 手がトラッキングされているか確認
          if (hands && hands.hands && hands.hands.length > 0) {
            const hand = hands.hands[0]; // 検出された片手を使用
            const joints = hand.joints;

            if (joints && Object.keys(joints).length >= 25) {
              // 5つの指先の位置を取得
              const tips = [
                joints['thumb-tip'].position,
                joints['index-finger-tip'].position,
                joints['middle-finger-tip'].position,
                joints['ring-finger-tip'].position,
                joints['pinky-finger-tip'].position
              ];

              // 指先群の重心（中心点）を計算
              const centroid = new THREE.Vector3();
              tips.forEach(t => centroid.add(t));
              centroid.divideScalar(tips.length);

              // 指先から重心までの平均距離を「イチゴの半径」として算出
              let radius = 0;
              tips.forEach(t => radius += centroid.distanceTo(t));
              radius /= tips.length;

              // 視覚化用オブジェクト（球体）の更新
              this.sphere.position.copy(centroid);
              this.sphere.scale.setScalar(radius);
              this.sphere.visible = true;

              // 指先を繋ぐラインの更新
              const positions = this.line.geometry.attributes.position.array;
              for(let i = 0; i < tips.length; i++) {
                positions[i*3]     = tips[i].x;
                positions[i*3 + 1] = tips[i].y;
                positions[i*3 + 2] = tips[i].z;
              }
              this.line.geometry.attributes.position.needsUpdate = true;
              this.line.visible = true;

              // 物理計算 (Three.jsの単位はメートルなので、cmに変換)
              const r_cm = radius * 100;
              // 球の体積 V = 4/3 * π * r^3
              const volume_cm3 = (4 / 3) * Math.PI * Math.pow(r_cm, 3);
              // イチゴの密度はおよそ水と同等 (約 1.0 g/cm³)
              const weight_g = volume_cm3 * 1.0; 

              // パネルUIのテキストを更新
              this.radiusText.setText(`推定半径: ${r_cm.toFixed(1)} cm`);
              this.volumeText.setText(`推定体積: ${volume_cm3.toFixed(1)} cm³`);
              this.weightText.setText(`推定重量: ${weight_g.toFixed(1)} g`);
            } else {
              this.hideVisuals();
            }
          } else {
            this.hideVisuals();
          }
        }

        hideVisuals() {
          this.sphere.visible = false;
          this.line.visible = false;
        }
      }

      document.addEventListener('DOMContentLoaded', async function () {
        const options = new xb.Options();
        options.enableUI();
        options.enableHands();
        options.setAppTitle('Strawberry Weigher');
        
        // ハンドトラッキングを有効にしつつ、手やジョイントの白いボックスは非表示にする
        options.hands.enabled = true;
        options.hands.visualization = false;
        options.hands.visualizeJoints = false;
        
        xb.add(new StrawberryWeigher());
        await xb.init(options);
      });
    </script>
  </body>
</html>
